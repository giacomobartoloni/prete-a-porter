name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [a2a-protocol, chat-orchestrator, liturgy-agent, homily-agent]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: packages/${{ matrix.package }}
        run: uv sync --extra dev

      - name: Run unit tests
        working-directory: packages/${{ matrix.package }}
        run: uv run pytest tests/ -v --junit-xml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.package }}
          path: packages/${{ matrix.package }}/test-results.xml
          retention-days: 7
