# Preteaporter Docker Compose
# Multi-agent A2A system with WebSocket orchestration

services:
  # Chat Orchestrator - WebSocket server on port 8000
  # Coordinates liturgy-agent and homily-agent via A2A protocol
  chat-orchestrator:
    build:
      context: .
      dockerfile: packages/chat-orchestrator/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - A2A_LITURGY_URL=http://liturgy-agent:8001
      - A2A_HOMILY_URL=http://homily-agent:8002
      - WS_JWT_SECRET=${WS_JWT_SECRET}
      - A2A_BASIC_AUTH_USERNAME=${A2A_BASIC_AUTH_USERNAME}
      - A2A_BASIC_AUTH_PASSWORD=${A2A_BASIC_AUTH_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      liturgy-agent:
        condition: service_healthy
      homily-agent:
        condition: service_healthy
    networks:
      - preteaporter-network
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import httpx; exit(0 if httpx.get('http://localhost:8000/health', timeout=5.0).status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    volumes:
      - ./data:/app/data

  # Liturgy Agent - HTTP A2A server on port 8001
  # Provides liturgical content generation and retrieval
  liturgy-agent:
    build:
      context: .
      dockerfile: packages/liturgy-agent/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - AGENT_CONTRACT_PATH=/app/contracts/liturgy-agent-contract.json
      - AGENT_URL=http://liturgy-agent:8001
      - A2A_BASIC_AUTH_USERNAME=${A2A_BASIC_AUTH_USERNAME}
      - A2A_BASIC_AUTH_PASSWORD=${A2A_BASIC_AUTH_PASSWORD}
    networks:
      - preteaporter-network
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import httpx; exit(0 if httpx.get('http://localhost:8001/health', timeout=5.0).status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 10
    volumes:
      - ./data:/app/data

  # Homily Agent - HTTP A2A server on port 8002
  # Provides homily content generation and spiritual guidance
  homily-agent:
    build:
      context: .
      dockerfile: packages/homily-agent/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - AGENT_CONTRACT_PATH=/app/contracts/homily-agent-contract.json
      - AGENT_URL=http://homily-agent:8002
      - A2A_BASIC_AUTH_USERNAME=${A2A_BASIC_AUTH_USERNAME}
      - A2A_BASIC_AUTH_PASSWORD=${A2A_BASIC_AUTH_PASSWORD}
    networks:
      - preteaporter-network
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import httpx; exit(0 if httpx.get('http://localhost:8002/health', timeout=5.0).status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 10

  # Frontend - Next.js Web UI on port 3000
  # Chat interface connecting to chat-orchestrator via WebSocket
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - WS_URL=${WS_URL:-ws://chat-orchestrator:8000/ws/chat}
      - ORCHESTRATOR_URL=http://chat-orchestrator:8000
      - WS_JWT_SECRET=${WS_JWT_SECRET}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - DATABASE_URL=file:../data/dev.db
    depends_on:
      chat-orchestrator:
        condition: service_healthy
    networks:
      - preteaporter-network
    volumes:
      - frontend-db:/app/data

  # Caddy - Reverse proxy with automatic TLS (Let's Encrypt)
  # Routes: /ws/* → chat-orchestrator, /* → frontend
  # Ports 80/443 must be open in the Hetzner cloud firewall
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - chat-orchestrator
    networks:
      - preteaporter-network
    restart: unless-stopped

  # A2A Inspector - Web UI for testing agents via standard A2A protocol
  # Access at http://localhost:8080, then enter http://liturgy-agent:8001
  # Port 8080 is blocked by Hetzner firewall in production
  a2a-inspector:
    image: a2a-inspector
    ports:
      - "8080:8080"
    networks:
      - preteaporter-network

volumes:
  frontend-db:
  caddy_data:
  caddy_config:

networks:
  preteaporter-network:
    driver: bridge